# A utiliser pour dépoloyer sur un site en production

services:
  client:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ../client:/app
    ports:
      - 80:5173
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
  api:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ../api:/app
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://lapince:lapince@database:5432/lapince
      - JWT_SECRET=dev-secret
      - SALT_ROUNDS=10
    ports:
      - 3000:3000
    command: sh -c "npm install && npm run db:generate && npm run db:migrate:dev && npm run dev"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
  database:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=lapince
      - POSTGRES_USER=lapince
      - POSTGRES_DB=lapince
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U lapince -d lapince"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
