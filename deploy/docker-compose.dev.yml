# A utiliser pour dépoloyer sur un site en production

services:
  client:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ../client:/app
    ports:
      - 80:5173
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
  api:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ../api:/app
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://lapince:lapince@database:5432/lapince
      - JWT_SECRET=dev-secret
      - SALT_ROUNDS=10
    ports:
      - 3000:3000
    command: sh -c "npm install && npm run db:generate && npm run db:migrate:dev && npm run dev"
    depends_on:
      - database
  database:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=lapince
      - POSTGRES_USER=lapince
      - POSTGRES_DB=lapince
    ports:
      - 5433:5432
