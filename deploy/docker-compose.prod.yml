services:
  client:
    build:
      context: ../client
      dockerfile: ./docker/Dockerfile.prod
      args:
        - API_BASE_URL=http://localhost:3000
    ports:
      - 80:80
  api:
    build:
      context: ../api
      dockerfile: ./docker/Dockerfile.prod
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://lapince:lapince@localhost:5433/lapince
      - JWT_SECRET=dev-secret
      - SALT_ROUNDS=10
    ports:
      - 3000:3000
